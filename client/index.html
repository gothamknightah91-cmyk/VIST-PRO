<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Вист Онлайн</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login">

<h1>♠ Вист Онлайн ♠</h1>

<input id="name" placeholder="Име">

<input id="room" placeholder="Код">

<button id="createRoomBtn">
Създай стая
</button>

<button id="joinBtn">
Влез
</button>

</div>



<div id="game" style="display:none">


<div id="status">
Статус
</div>


<div id="turn">
Ред
</div>


<div id="players">
</div>


<div id="scores">
</div>



<div id="opponent-top">
</div>

<div id="opponent-left">
</div>

<div id="opponent-right">
</div>



<div id="table">
</div>


<div id="hand">
</div>



<div id="trumps" class="hidden">

<button onclick="chooseTrump('♠')">♠</button>
<button onclick="chooseTrump('♥')">♥</button>
<button onclick="chooseTrump('♦')">♦</button>
<button onclick="chooseTrump('♣')">♣</button>

</div>




<div id="chat">

<div id="messages">
</div>

<input id="msg">

<button id="sendBtn">
Изпрати
</button>

</div>


</div>



<script src="client.js?v=10"></script>

</body>
</html>
